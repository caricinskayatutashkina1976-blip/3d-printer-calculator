<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintCost — вход</title>
  <style>
    :root {
      --bg: linear-gradient(130deg, #f4f8ff, #eef2ff);
      --surface: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --link: #2563eb;
      --link-hover: #1d4ed8;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.1);
    }

    html.dark-theme {
      --bg: linear-gradient(130deg, #0b1120, #172554);
      --surface: #0f172a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --link: #60a5fa;
      --link-hover: #93c5fd;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.4);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px 80px;
      box-sizing: border-box;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .card {
      max-width: 420px;
      width: 100%;
      background: var(--surface);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      text-align: center;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 14px;
    }

    html.dark-theme .badge {
      background: #38bdf8;
      color: #0f172a;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.25;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .cta {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 12px;
      background: var(--link);
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.2s ease;
    }

    .cta:hover {
      background: var(--link-hover);
    }

    .theme-toggle {
      position: fixed;
      right: 16px;
      bottom: 16px;
      padding: 11px 16px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      background: #111827;
      color: #fff;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
      transition: transform 0.15s ease, background 0.2s ease;
      z-index: 100;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      background: #0f172a;
    }

    html.dark-theme .theme-toggle {
      background: #e2e8f0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge" aria-hidden="true">3D</div>
    <h1>PrintCost</h1>
    <p>Калькулятор стоимости 3D-печати с приветственным лендингом. Выберите тему и переходите к расчётам.</p>
    <a class="cta" href="3d_print_calculator.html">Открыть калькулятор</a>
  </div>

  <button id="themeToggle" class="theme-toggle" type="button">🌙 Тёмная тема</button>

  <script>
    function setTheme(theme) {
      var isDark = theme === 'dark';
      document.documentElement.classList.toggle('dark-theme', isDark);
      document.getElementById('themeToggle').textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
    }

    function toggleTheme() {
      var next = document.documentElement.classList.contains('dark-theme') ? 'light' : 'dark';
      setTheme(next);
      localStorage.setItem('theme', next);
    }

    var saved = localStorage.getItem('theme') || 'light';
    setTheme(saved);
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  </script>
</body>
</html>
